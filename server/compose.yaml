services:
  backend:
    build:
      context: ..
      dockerfile: server/backend.Dockerfile
    restart: unless-stopped
    environment:
      UVICORN_WORKERS: "2"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ..
      dockerfile: server/frontend.Dockerfile
      args:
        VITE_API_BASE: ""
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "18080:80"
